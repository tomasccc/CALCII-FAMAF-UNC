<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor ERGO</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
  <style>
    #nc-root {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol" !important;
    }

    div[class*="AppHeader"] {
      background-color: #000000 !important;
    }

    button[class*="Button"] {
      border-radius: 6px !important;
      font-weight: 500 !important;
    }

  </style>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/decap-cms-locales@^3.0.0/dist/decap-cms-locales-es.js"></script>
  <script>
    const h = window.h;
    const createClass = window.createClass;

    // registramos el plugin de kateX para marked una sola vez
    marked.use(markedKatex({ throwOnError: false, trust: true }));
    var PostPreview = createClass({
      // lógica para procesar los links e imágenes
      processContent: function (text) {
        if (!text) return '';
        return text
          .replace(/!\[\[(.*?)\]\]/g, (_, p1) => {
            const name = p1.split('|')[0].trim();
            return `\n\n![${name}](../assets/comunidad/${name})\n\n`;
          })
          .replace(/\[\[(.*?)\]\]/g, (_, p1) => {
            const parts = p1.split('|');
            const name = parts[0].trim();
            const label = parts[1] ? parts[1].trim() : name;
            return `[${label}](../${name})`;
          });
      },

      // se ejecuta automáticamente con cada tecla que presiona el usuario
      render: function () {
        const body = this.props.entry.getIn(['data', 'body']) || '';
        const processed = this.processContent(body);
        const html = marked.parse(processed);

        // devolvemos el HTML al panel de la derecha
        return h('div', { className: 'markdown-body' },
          h('div', { dangerouslySetInnerHTML: { __html: html } })
        );
      }
    });

    // buscamos en el config.yml las carpetas
    fetch('config.yml')
      .then(response => response.text())
      .then(yamlText => {
        const regex = /name:\s*['"]?(oficial[a-zA-Z0-9_]*|comunidad[a-zA-Z0-9_]*)['"]?/g;
        let match;
        
        while ((match = regex.exec(yamlText)) !== null) {
          const nombreColeccion = match[1];
          CMS.registerPreviewTemplate(nombreColeccion, PostPreview);
        }
      })
      .catch(error => console.error("Error al leer config.yml:", error));

    // inyección de estilos en el iframe
    CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css");
    CMS.registerPreviewStyle("https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css");

    CMS.registerPreviewStyle(`
      .markdown-body { 
        background-color: white !important; 
        color: #24292f !important; 
        min-height: 100vh; 
        padding: 30px; 
      }
    `, { raw: true });
  </script>
</body>

</html>
