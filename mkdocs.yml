site_name: !ENV [SITE_NAME, "ERGO"]
site_description: !ENV [SITE_DESCRIPTION, "Sitio estático para notas colaborativas"]
site_url: !ENV [SITE_URL, "https://tomasccc.github.io/"]

repo_url: !ENV [REPO_URL, "https://github.com/tomasccc/ergo"]
repo_name: !ENV [REPO_NAME, "tomasccc/ergo"]
edit_uri: !ENV [EDIT_URI, "edit/main/docs/"]

theme:
  name: material
  custom_dir: overrides  
  logo: assets/logo.png
  favicon: assets/logo2.png  
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - navigation.prerender
    - search.highlight
    - search.share
    - search.full_text
    - search.math
    - search.suggest
    - navigation.indexes 
  font:
    text: Inter
    code: Inter
  palette:
    - scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: black
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tomasccc
      name: Mi GitHub
    - icon: fontawesome/brands/linux
      link: https://linuxmint.com/
      name: Linux Mint

plugins:
  - search
  - awesome-pages 
  - macros      
  - tags:
      tags_file: tags.md
  - social:
      cards_layout_options:
        background_color: "#3f51b5"  
        color: "#ffffff"            
        font_family: Inter
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  - git-committers:
      repository: !ENV [REPO_NAME, "tomasccc/ergo"] 
      branch: main
  - git-authors:
      show_contribution: true
      show_line_count: true        
      ignore_authors:
        - "dependabot[bot]"
        - "dependabot-preview[bot]"
        - "dependabot-core[bot]"
        - "dependabot"
        - "dependabot[bot]"
        - "dependabot-preview" 
        - "dependabot-core" 

hooks:
  - hooks.py

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true 
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js