local_backend: true

backend:
  name: github
  repo: tomasccc/CALCII-FAMAF-UNC
  branch: cms-tests
publish_mode: simple
media_folder: docs/assets/comunidad
public_folder: /assets/comunidad
collections:
- name: comunidad_raiz
  label: 📂 Comunidad (Raíz / Crear Carpeta)
  folder: docs/comunidad
  path: '{{carpeta}}/{{slug}}'
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: 📁 Destino del apunte
    name: carpeta
    widget: string
    default: general
    required: true
    hint: '👉 Para archivo suelto: dejá la palabra "general".

      👉 Para una nueva carpeta: borrá "general" y escribí el nombre SIN ESPACIOS (ej:
      unidad-4).'
    pattern:
    - ^[a-zA-Z0-9_-]+$
    - '⚠️ El nombre no puede tener espacios, puntos ni barras. Usá guiones (ejemplo:
      apuntes-extra).'
  - label: Título
    name: title
    widget: string
    hint: El título de la nota.
  - label: Cuerpo
    name: body
    widget: markdown
- name: comunidad_asd
  label: '📚 Comunidad: asd'
  folder: docs/comunidad/asd
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
- name: comunidad_comunidad
  label: '📚 Comunidad: comunidad'
  folder: docs/comunidad/comunidad
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
- name: oficial_raiz
  label: 📂 Oficial (Raíz / Crear Carpeta)
  folder: docs/oficial
  path: '{{carpeta}}/{{slug}}'
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: 📁 Destino del apunte
    name: carpeta
    widget: string
    default: general
    required: true
    hint: '👉 Para archivo suelto: dejá la palabra "general".

      👉 Para una nueva carpeta: borrá "general" y escribí el nombre SIN ESPACIOS (ej:
      unidad-4).'
    pattern:
    - ^[a-zA-Z0-9_-]+$
    - '⚠️ El nombre no puede tener espacios, puntos ni barras. Usá guiones (ejemplo:
      apuntes-extra).'
  - label: Título
    name: title
    widget: string
    hint: El título de la nota.
  - label: Cuerpo
    name: body
    widget: markdown
- name: oficial_conceptos
