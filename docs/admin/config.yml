local_backend: true
locale: es
backend:
  name: github
  repo: tomasccc/CALCII-FAMAF-UNC
  branch: cms-tests
publish_mode: simple
media_folder: docs/assets/comunidad
public_folder: /assets/comunidad
collections:
- name: comunidad_raiz
  label: 📂 Comunidad (Raíz / Crear Carpeta)
  folder: docs/comunidad
  path: '{{carpeta}}/{{slug}}'
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: ¿Crear en subcarpeta nueva? (Opcional)
    name: carpeta
    widget: string
    default: .
    hint: 'Para guardar en la raíz, dejá el punto. Para crear una carpeta, borrá el
      punto y escribí el nombre (ej: Unidad 4)'
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
- name: oficial_raiz
  label: 📂 Oficial (Raíz / Crear Carpeta)
  folder: docs/oficial
  path: '{{carpeta}}/{{slug}}'
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: ¿Crear en subcarpeta nueva? (Opcional)
    name: carpeta
    widget: string
    default: .
    hint: 'Para guardar en la raíz, dejá el punto. Para crear una carpeta, borrá el
      punto y escribí el nombre (ej: Unidad 4)'
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
- name: oficial_conceptos
  label: '📚 Oficial: Conceptos'
  folder: docs/oficial/Conceptos
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
- name: oficial_series_de_potencias___u3
  label: '📚 Oficial: Series de potencias - U3'
  folder: docs/oficial/Series de potencias - U3
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
- name: oficial_u1_u2
  label: '📚 Oficial: U1-U2'
  folder: docs/oficial/U1-U2
  create: true
  extension: md
  summary: '{{title}}'
  fields:
  - label: Título
    name: title
    widget: string
  - label: Cuerpo
    name: body
    widget: markdown
