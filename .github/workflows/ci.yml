name: Deploy Notas FAMAF

on:
  push:
    branches:
      - main  

permissions:
  contents: write 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python y caché de pip
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias gráficas del sistema (Para Social Cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Instalar dependencias de MkDocs
        run: |
          pip install -r requirements.txt
          pip install "mkdocs<2.0" mkdocs-git-revision-date-localized-plugin mkdocs-git-authors-plugin

      - name: Construir y publicar en GitHub Pages
        run: mkdocs gh-deploy --force