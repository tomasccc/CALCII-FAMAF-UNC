name: Deploy Notas FAMAF

on:
  push:
    branches:
      - main  

permissions:
  contents: write 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar Python y caché de pip
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias gráficas del sistema (Para Social Cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Instalar dependencias de MkDocs
        run: |
          pip install -r requirements.txt
          pip install "mkdocs<2.0" mkdocs-material mkdocs-git-revision-date-localized-plugin mkdocs-git-committers-plugin-2 mkdocs-git-authors-plugin mkdocs-awesome-pages-plugin mkdocs-macros-plugin

      - name: Configurar Variables de Entorno Dinámicas
        id: vars
        run: |
          RAW_REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          
          CLEAN_NAME=$(echo $RAW_REPO_NAME | tr '-' ' ' | tr '[:lower:]' '[:upper:]')
          
          # 3. Guardamos para los siguientes pasos
          echo "SITE_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          echo "SITE_URL=https://${{ github.repository_owner }}.github.io/$RAW_REPO_NAME/" >> $GITHUB_ENV
          echo "REPO_URL=https://github.com/${{ github.repository }}" >> $GITHUB_ENV
          echo "REPO_NAME=${{ github.repository }}" >> $GITHUB_ENV

      - name: Construir y publicar en GitHub Pages
        run: mkdocs gh-deploy --force
        env:
          SITE_NAME: ${{ env.SITE_NAME }}
          SITE_URL: ${{ env.SITE_URL }}
          REPO_URL: ${{ env.REPO_URL }}
          REPO_NAME: ${{ env.REPO_NAME }}
          EDIT_URI: "edit/main/docs/"